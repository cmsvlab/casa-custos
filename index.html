function renderStats(){
  const el = document.getElementById('vStats');
  const hist = S.history.slice().sort((a,b)=> a.year!==b.year ? a.year-b.year : a.month-b.month);

  if(hist.length < 1){
    el.innerHTML=`<div class="stat-empty"><span style="font-size:2.4rem;display:block;opacity:.3;margin-bottom:10px">📊</span>Ainda não há histórico guardado.<br>Guarda pelo menos um mês para ver estatísticas.</div>`;
    return;
  }

  const fmtE = v => (Math.round(v*100)/100).toFixed(2).replace('.',',')+'€';
  const months = hist.map(h => MONTHS_PT[h.month].slice(0,3)+' '+String(h.year).slice(2));

  const totals  = hist.map(h => Object.values(h.shares).reduce((a,b)=>a+(b>0?b:0),0));
  const avgTotal = totals.reduce((a,b)=>a+b,0)/totals.length;
  const maxTotal = Math.max(...totals);
  const minTotal = Math.min(...totals);
  const lastTotal = totals[totals.length-1];
  const prevTotal = totals.length>1 ? totals[totals.length-2] : null;
  const diffPct = prevTotal ? ((lastTotal-prevTotal)/prevTotal*100) : null;
  const diffStr = diffPct === null ? '' : (diffPct>0?`+${diffPct.toFixed(0)}%`:`${diffPct.toFixed(0)}%`);
  const diffCls = diffPct === null ? '' : (diffPct>1?'diff-up':diffPct<-1?'diff-dn':'diff-eq');

  const kpiHtml = `
    <div class="stat-kpi-grid">
      <div class="stat-kpi"><div class="stat-kpi-label">Último mês</div><div class="stat-kpi-val">${fmtE(lastTotal)}</div><div class="stat-kpi-sub ${diffCls}">${diffStr||'—'} vs anterior</div></div>
      <div class="stat-kpi"><div class="stat-kpi-label">Média mensal</div><div class="stat-kpi-val">${fmtE(avgTotal)}</div><div class="stat-kpi-sub">${hist.length} ${hist.length===1?'mês':'meses'}</div></div>
      <div class="stat-kpi"><div class="stat-kpi-label">Máximo</div><div class="stat-kpi-val">${fmtE(maxTotal)}</div><div class="stat-kpi-sub">${months[totals.indexOf(maxTotal)]}</div></div>
      <div class="stat-kpi"><div class="stat-kpi-label">Mínimo</div><div class="stat-kpi-val">${fmtE(minTotal)}</div><div class="stat-kpi-sub">${months[totals.indexOf(minTotal)]}</div></div>
    </div>`;

  const lineChart = buildLineChart(hist, months, totals);
  const barChart  = buildBarChart(hist, months);
  const avgTable  = buildAvgTable(hist);

  el.innerHTML = `
    <div class="view-inner">
      ${kpiHtml}
      <div class="stat-charts-grid">
        <div class="stat-card"><div class="stat-title">Custo total por mês</div>${lineChart}</div>
        <div class="stat-card"><div class="stat-title">Divisão por pessoa</div>${barChart}</div>
      </div>
      <div class="stat-card"><div class="stat-title">Médias por despesa</div>${avgTable}</div>
    </div>
  `;
}

function buildLineChart(hist, months, totals){
  if(hist.length < 2) return `<p class="tsm tmuted" style="text-align:center;padding:16px">Precisas de pelo menos 2 meses guardados.</p>`;
  const W=340, H=160, PL=46, PR=12, PT=12, PB=32;
  const cW=W-PL-PR, cH=H-PT-PB;
  const maxV = Math.max(...totals)*1.1||1;
  const minV = Math.min(...totals)*0.9;
  const range = maxV-minV||1;
  const n = totals.length;
  const xScale = i => PL + (i/(n-1||1))*cW;
  const yScale = v => PT + cH - ((v-minV)/range)*cH;
  const gridVals = [minV+(range*0.25), minV+(range*0.5), minV+(range*0.75), maxV];
  let gridLines = gridVals.map(v=>{
    const y = yScale(v);
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#e8e0d6" stroke-width="1"/>
            <text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#b8aea4">${Math.round(v)}€</text>`;
  }).join('');
  const areaD = `M${xScale(0)},${H-PB} ` + totals.map((v,i)=>`L${xScale(i)},${yScale(v)}`).join(' ') + ` L${xScale(n-1)},${H-PB} Z`;
  const lineD = totals.map((v,i)=>(i===0?'M':'L')+`${xScale(i)},${yScale(v)}`).join(' ');
  const step = n <= 6 ? 1 : n <= 12 ? 2 : Math.ceil(n/6);
  let xLabels = totals.map((_,i)=>{
    if(i % step !== 0 && i !== n-1) return '';
    return `<text x="${xScale(i)}" y="${H-PB+14}" text-anchor="middle" font-size="8.5" fill="#8c8078">${months[i]}</text>`;
  }).join('');
  let dots = totals.map((v,i)=>`<circle cx="${xScale(i)}" cy="${yScale(v)}" r="3.5" fill="#b5451b" stroke="#fff" stroke-width="1.5"/><title>${months[i]}: ${(Math.round(v*100)/100).toFixed(2).replace('.',',')}€</title>`).join('');
  const avg = totals.reduce((a,b)=>a+b,0)/n;
  const avgY = yScale(avg);
  return `<div class="stat-chart">
    <svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block">
      <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b5451b" stop-opacity=".18"/><stop offset="100%" stop-color="#b5451b" stop-opacity="0"/></linearGradient></defs>
      ${gridLines}
      <path d="${areaD}" fill="url(#lg1)"/>
      <line x1="${PL}" y1="${avgY}" x2="${W-PR}" y2="${avgY}" stroke="#b5451b" stroke-width="1" stroke-dasharray="4,3" opacity=".4"/>
      <text x="${W-PR+2}" y="${avgY+4}" font-size="8" fill="#b5451b" opacity=".7">média</text>
      <path d="${lineD}" fill="none" stroke="#b5451b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
      ${xLabels}
    </svg>
  </div>`;
}

function buildBarChart(hist, months){
  if(!hist.length) return '';
  const people = hist[hist.length-1].people || S.people;
  const W=340, H=170, PL=46, PR=12, PT=12, PB=32;
  const cW=W-PL-PR, cH=H-PT-PB;
  const n = hist.length;
  const barW = Math.max(6, Math.min(28, (cW/n)*0.72));
  const gap  = cW/n;
  let maxStacked = 0;
  hist.forEach(h=>{
    const stacked = people.reduce((a,p)=>a+Math.max(0,h.shares[p.id]||0),0);
    if(stacked > maxStacked) maxStacked = stacked;
  });
  maxStacked = maxStacked*1.08||1;
  const gridVals = [maxStacked*0.25, maxStacked*0.5, maxStacked*0.75, maxStacked];
  let grid = gridVals.map(v=>{
    const y = PT + cH - (v/maxStacked)*cH;
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#e8e0d6" stroke-width="1"/>
            <text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#b8aea4">${Math.round(v)}€</text>`;
  }).join('');
  let bars = '';
  const step = n <= 6 ? 1 : n <= 12 ? 2 : Math.ceil(n/6);
  hist.forEach((h,i)=>{
    const x = PL + i*gap + gap/2 - barW/2;
    let yOff = PT+cH;
    people.forEach(p=>{
      const v = Math.max(0, h.shares[p.id]||0);
      if(!v) return;
      const bh = (v/maxStacked)*cH;
      yOff -= bh;
      bars += `<rect x="${x}" y="${yOff}" width="${barW}" height="${bh}" fill="${p.color}" rx="2" opacity=".85"><title>${p.name} — ${months[i]}: ${(Math.round(v*100)/100).toFixed(2).replace('.',',')}€</title></rect>`;
    });
    if(i % step === 0 || i === n-1){
      bars += `<text x="${PL+i*gap+gap/2}" y="${H-PB+14}" text-anchor="middle" font-size="8.5" fill="#8c8078">${months[i]}</text>`;
    }
  });
  const legend = people.map(p=>`<div class="stat-leg-item"><div class="stat-leg-dot" style="background:${p.color}"></div>${p.name}</div>`).join('');
  return `<div class="stat-chart">
    <svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block">
      ${grid}${bars}
    </svg>
  </div>
  <div class="stat-legend">${legend}</div>`;
}

function buildAvgTable(hist){
  if(!hist.length) return '';
  const expMap = {};
  hist.forEach(h=>{
    (h.expenses||[]).forEach(exp=>{
      if(!expMap[exp.id]) expMap[exp.id] = {id:exp.id, name:exp.name, emoji:exp.emoji, vals:[]};
    });
  });
  hist.forEach(h=>{
    (h.expenses||[]).forEach(exp=>{
      const amt = parseFloat(h.entry?.amounts?.[exp.id])||0;
      if(expMap[exp.id] && amt>0) expMap[exp.id].vals.push(amt);
    });
  });
  const lastH = hist[hist.length-1];
  const lastAmounts = lastH.entry?.amounts || {};
  let rows = Object.values(expMap).map(exp=>{
    if(!exp.vals.length) return '';
    const avg = exp.vals.reduce((a,b)=>a+b,0)/exp.vals.length;
    const last = parseFloat(lastAmounts[exp.id])||0;
    const diff = last - avg;
    const diffPct = avg ? (diff/avg*100) : 0;
    const diffStr = Math.abs(diffPct)<1 ? '—' : (diff>0?`+${diffPct.toFixed(0)}%`:`${diffPct.toFixed(0)}%`);
    const diffCls = Math.abs(diffPct)<1 ? 'diff-eq' : diff>0 ? 'diff-up' : 'diff-dn';
    return `<div class="stat-avg-row">
      <span class="stat-avg-ico">${exp.emoji}</span>
      <span class="stat-avg-name">${exp.name}</span>
      <div class="stat-avg-vals">
        <div class="stat-avg-val"><span class="stat-avg-lbl">Média</span><span class="stat-avg-num">${(Math.round(avg*100)/100).toFixed(2).replace('.',',')}€</span></div>
        <div class="stat-avg-val"><span class="stat-avg-lbl">Último</span><span class="stat-avg-num">${last?(Math.round(last*100)/100).toFixed(2).replace('.',',')+'€':'—'}</span></div>
        <div class="stat-avg-val"><span class="stat-avg-lbl">vs média</span><span class="stat-avg-diff ${diffCls}">${diffStr}</span></div>
      </div>
    </div>`;
  }).join('');
  return rows || `<p class="tsm tmuted" style="text-align:center;padding:12px">Sem dados suficientes.</p>`;
}

function openHelpModal(initialTab){
  const tab = initialTab && HELP_CONTENT[initialTab] ? initialTab : 'visao';
  const tabsHtml = HELP_TABS.map(t =>
    `<button class="help-tab${t.id===tab?' on':''}" onclick="switchHelpTab('${t.id}')" data-htab="${t.id}">${t.lbl}</button>`
  ).join('');
  const sectionsHtml = HELP_TABS.map(t =>
    `<div class="help-section${t.id===tab?' on':''}" id="hsec-${t.id}">${HELP_CONTENT[t.id]}</div>`
  ).join('');
  openModal(`
    <span class="mpill"></span>
    <div class="mtitle">📖 Como funcionam as contas</div>
    <div class="help-tabs-wrap"><div class="help-tabs">${tabsHtml}</div></div>
    ${sectionsHtml}
    <div class="mfoot">
      <button class="btn bink" onclick="closeModal()" style="width:100%">Percebido</button>
    </div>
  `);
}

function switchHelpTab(id){
  document.querySelectorAll('.help-tab').forEach(el=>el.classList.toggle('on', el.dataset.htab===id));
  document.querySelectorAll('.help-section').forEach(el=>el.classList.toggle('on', el.id==='hsec-'+id));
  const modal = document.getElementById('mbox');
  if(modal) modal.scrollTop = 0;
}

/* ═══════════════════════════════════════════
   20. MODAL & TOAST primitives
   ═══════════════════════════════════════════ */
function openModal(html){document.getElementById('mbox').innerHTML=html;document.getElementById('mbg').classList.remove('off');}
function closeModal(){document.getElementById('mbg').classList.add('off');}
function bgClose(e){if(e.target.id==='mbg')closeModal();}
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2600);}

/* ═══════════════════════════════════════════
   21. FIREBASE SYNC
   ═══════════════════════════════════════════
   The watcher fires on ANY change to /casa, including changes we wrote
   ourselves. We use _myWriteAt to suppress re-renders for ~3s after
   we wrote. We also suppress re-render while the user is typing in any
   input — losing focus mid-keystroke is the worst UX.
   ─────────────────────────────────────────── */
let _fbSynced = false;

function setFbStatus(ok){
  const b=document.getElementById('fb-status');
  if(!b) return;
  b.textContent = ok ? '☁️ sync' : '📵 offline';
  b.style.background = ok ? '#eaf5ee' : '#fdecea';
  b.style.color = ok ? '#1e7a4a' : '#b5451b';
}

function applyRemoteData(remote){
  // null means Firebase DB is empty — push our local data up
  if(remote === null){
    console.log('Firebase DB vazia — a guardar dados locais no Firebase');
    if(window._fbSet && !_fbReceiving){
      const data={people:S.people,expenses:S.expenses,monthly:S.monthly,history:S.history};
      window._fbSet(data).catch(e=>console.error('Firebase initial write error:',e));
    }
    return;
  }
  if(!remote || typeof remote !== 'object') return;
  try{
    _fbReceiving = true;
    const people   = toArr(remote.people);
    const expenses = toArr(remote.expenses);
    const history  = toArr(remote.history);
    const monthly  = (remote.monthly && typeof remote.monthly === 'object') ? remote.monthly : {};

    if(people.length)   S.people   = people;
    if(expenses.length) S.expenses = expenses;
    S.monthly  = monthly;
    S.history  = history;

    // Fix nested arrays inside monthly entries
    Object.values(S.monthly).forEach(entry => {
      if(entry.extraCharges      && !Array.isArray(entry.extraCharges))      entry.extraCharges      = toArr(entry.extraCharges);
      if(entry.quickExpenses     && !Array.isArray(entry.quickExpenses))     entry.quickExpenses     = toArr(entry.quickExpenses);
      if(entry.externalContribs  && !Array.isArray(entry.externalContribs))  entry.externalContribs  = toArr(entry.externalContribs);
      // fixedCosts is an object, not array — leave alone
    });

    // Sanitize expenses fields
    S.expenses.forEach(e=>{
      if(e.fixedCost===undefined) e.fixedCost=0;
      if(!e.weights || typeof e.weights !== 'object' || Array.isArray(e.weights)) e.weights={};
      if(e.equalPeople && !Array.isArray(e.equalPeople)) e.equalPeople = toArr(e.equalPeople);
      else if(!e.equalPeople) e.equalPeople = null;
    });

    S.people.forEach(p=>{
      if(p.days && !Array.isArray(p.days)) p.days = toArr(p.days);
    });

    const payload={people:S.people,expenses:S.expenses,monthly:S.monthly,history:S.history};
    try{ localStorage.setItem('casa_v5', JSON.stringify(payload)); }catch(e){}
  }catch(e){ console.error('applyRemoteData error:',e); }
  finally{ _fbReceiving=false; }
}

function initFirebase(){
  if(!window._fbWatch){
    if(window._fbInitError){
      console.error('Firebase unavailable:', window._fbInitError);
      document.getElementById('fb-loading').style.display='none';
      setFbStatus(false);
      renderMonth();
      return;
    }
    setTimeout(initFirebase, 200);
    return;
  }

  window._fbWatch(
    remoteData => {
      setFbStatus(true);
      applyRemoteData(remoteData);
      if(!_fbSynced){
        _fbSynced=true;
        document.getElementById('fb-loading').style.display='none';
        updateMlbl();
        renderMonth();
      } else {
        const isOwnEcho = (Date.now() - _myWriteAt) < 3000;
        const ae = document.activeElement;
        const userTyping = ae && (ae.tagName==='INPUT' || ae.tagName==='TEXTAREA' || ae.tagName==='SELECT');
        if(isOwnEcho || userTyping) return;
        updateMlbl();
        ({month:renderMonth,people:renderPeople,expenses:renderExpenses,history:()=>renderHistory(),stats:renderStats})[_ui.view]?.();
      }
    },
    err => {
      console.error('Firebase watch error:', err);
      if(!_fbSynced){
        _fbSynced=true;
        document.getElementById('fb-loading').style.display='none';
        setFbStatus(false);
        renderMonth();
        toast('⚠️ Firebase: ' + (err.message||'erro de ligação'));
      }
    }
  );
}

/* ═══════════════════════════════════════════
   22. INIT
   ═══════════════════════════════════════════ */

// ── Theme toggle ──────────────────────────────────────────
// Default: light. Persists in localStorage. Never follows system.
const THEME_KEY = 'casa_theme';

function applyTheme(dark){
  document.documentElement.classList.toggle('dark', dark);
  const btn = document.getElementById('themeBtn');
  if(btn){
    btn.textContent = dark ? '🌙' : '☀';
    btn.title = dark ? 'Mudar para tema claro' : 'Mudar para tema escuro';
    btn.setAttribute('aria-label', dark ? 'Mudar para tema claro' : 'Mudar para tema escuro');
  }
}

function toggleTheme(){
  const isDark = document.documentElement.classList.contains('dark');
  const newDark = !isDark;
  try{ localStorage.setItem(THEME_KEY, newDark ? 'dark' : 'light'); }catch(e){}
  applyTheme(newDark);
}

// Apply saved theme immediately (before render to avoid flash)
;(()=>{
  try{
    const saved = localStorage.getItem(THEME_KEY);
    // Default is light — only activate dark if explicitly saved
    applyTheme(saved === 'dark');
  }catch(e){ applyTheme(false); }
})();
updateMlbl();
document.getElementById('fb-loading').style.display='flex';

// ─── HAPTIC FEEDBACK ─────────────────────────────────
// Subtle vibration on mobile for tactile confirmation.
function haptic(style){
  if(!navigator.vibrate) return;
  ({light:()=>navigator.vibrate(6), medium:()=>navigator.vibrate(14), heavy:()=>navigator.vibrate(28)})[style||'light']?.();
}

// ─── SWIPE TO CHANGE MONTH ───────────────────────────
// On mobile, swipe left/right on the main content area.
let _tx=0, _ty=0;
document.getElementById('main').addEventListener('touchstart', e=>{
  _tx=e.touches[0].clientX; _ty=e.touches[0].clientY;
},{passive:true});
document.getElementById('main').addEventListener('touchend', e=>{
  if(_ui.view!=='month') return;
  const dx=e.changedTouches[0].clientX-_tx;
  const dy=e.changedTouches[0].clientY-_ty;
  // Only fire if clearly horizontal and meaningful distance
  if(Math.abs(dx)>56 && Math.abs(dx)>Math.abs(dy)*1.6) chMonth(dx>0?-1:1);
},{passive:true});

// Keyboard shortcuts: ←→ for month navigation, Escape to close modal
document.addEventListener('keydown', e => {
  const modal = document.getElementById('mbg');
  const modalOpen = modal && !modal.classList.contains('off');

  // PIN modal — numeric keys, backspace, enter
  if(modalOpen && document.getElementById('pinDisplay')){
    if(e.key >= '0' && e.key <= '9'){ e.preventDefault(); pinKey(e.key); haptic('light'); return; }
    if(e.key === 'Backspace'){ e.preventDefault(); pinBack(); return; }
    if(e.key === 'Escape'){ closeModal(); return; }
    return; // don't let other shortcuts fire while PIN modal is open
  }

  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if(e.key === 'ArrowLeft')  { e.preventDefault(); chMonth(-1); }
  if(e.key === 'ArrowRight') { e.preventDefault(); chMonth(1); }
  if(e.key === 'Escape')     { closeModal(); }
});

// Fallback: if nothing happens in 7s, load with local data
setTimeout(()=>{
  if(!_fbSynced){
    _fbSynced=true;
    document.getElementById('fb-loading').style.display='none';
    setFbStatus(false);
    renderMonth();
    toast('⚠️ Sem ligação — a usar dados locais');
  }
}, 7000);

initFirebase();

</script>
